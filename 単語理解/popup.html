<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>単語理解</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: #1c1917;
      color: #f5f0e8;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #292524;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      color: #ffffff;
      font-weight: 700;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .header-text p { font-size: 11px; color: #78716c; margin-top: 1px; }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #14532d22;
      border: 1px solid #166534;
      border-radius: 8px;
      padding: 8px 10px;
      color: #86efac;
      font-size: 12px;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .tip {
      background: #292524;
      border: 1px solid #44403c;
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 12px;
      color: #a8a29e;
      line-height: 1.6;
    }
    .tip strong { color: #ffffff; font-weight: 500; }
    .tip .step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
    }
    .step-num {
      width: 18px; height: 18px;
      background: #44403c;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: #ffffff;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .sources {
      font-size: 11px;
      color: #57534e;
      text-align: center;
      padding-bottom: 4px;
    }
    .sources a { color: #aaaaaa; text-decoration: none; }
    .sources a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">読</div>
    <div class="header-text">
      <h1>単語理解</h1>
      <p>単語理解 · v2.0</p>
    </div>
  </div>
  <div class="body">
    <div class="badge">
      <div class="badge-dot"></div>
      <span>Ready</span>
    </div>
    <div class="tip">
      <div class="step">
        <div class="step-num">1</div>
        <span>Select any Japanese text on a page (up to ~6 characters)</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>Click the <strong>検索</strong> button that floats above it</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>See the reading, meaning, and <strong>related words</strong> sharing the same kanji</span>
      </div>
    </div>
    <div class="sources">
      Powered by <a href="https://jisho.org" target="_blank">Jisho.org</a> &amp; <a href="https://kanjiapi.dev" target="_blank">kanjiapi.dev</a>
    </div>
  </div>
</body>
</html>
